<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Atkyn</title>
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; overflow: hidden; }

    body {
      position: fixed; inset: 0;
      overscroll-behavior: none;
      background: #fff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      display: flex; flex-direction: column;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; color: #f0f0f2; }
    }

    /* ── scroll host: logo + tabs + messages all scroll together ── */
    .scroll-host {
      flex: 1; min-height: 0;
      overflow-y: scroll;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      will-change: scroll-position;
    }
    .scroll-host::-webkit-scrollbar { display: none; }

    /* ── logo header ── */
    .logo-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      padding: 16px 18px 10px;
      overflow: hidden;
      transition: max-height 0.22s ease, padding 0.22s ease, opacity 0.18s ease;
      max-height: 80px;
      opacity: 1;
    }
    .logo-header img {
      height: 48px; width: auto; object-fit: contain;
    }
    .logo-header.collapsed {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* ── hamburger ── */
    .hamburger-btn {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      border: none; background: none; cursor: pointer;
      display: flex; flex-direction: column; justify-content: center; align-items: flex-end; gap: 5.5px;
      width: 40px; height: 40px; padding: 8px;
      border-radius: 10px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .hamburger-btn span { display: block; height: 1.5px; border-radius: 99px; background: #1a1a1a; }
    .hamburger-btn span:nth-child(1) { width: 22px; }
    .hamburger-btn span:nth-child(2) { width: 15px; }
    .hamburger-btn span:nth-child(3) { width: 22px; }
    .hamburger-btn:active { background: rgba(0,0,0,0.06); }
    @media (prefers-color-scheme: dark) {
      .hamburger-btn span { background: #e5e5e7; }
    }

    /* ── tab bar ── */
    .tab-bar {
      flex-shrink: 0;
      display: flex; align-items: center;
      overflow-x: auto; overflow-y: hidden;
      padding: 0 14px;
      gap: 0;
      border-bottom: 1px solid rgba(0,0,0,0.09);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: sticky; top: 0; z-index: 20;
      background: rgba(255,255,255,0.92);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      backdrop-filter: blur(12px) saturate(1.4);
      will-change: transform;
      transition: box-shadow 0.2s ease;
    }
    .tab-bar.scrolled { box-shadow: 0 1px 0 rgba(0,0,0,0.08); }
    .tab-bar::-webkit-scrollbar { display: none; }
    @media (prefers-color-scheme: dark) {
      .tab-bar { border-bottom-color: rgba(255,255,255,0.08); background: rgba(28,28,30,0.92); }
      .tab-bar.scrolled { box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
    }

    .tab {
      flex-shrink: 0;
      padding: 8px 13px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      letter-spacing: 0.01em;
      white-space: nowrap;
      border: none; background: none;
      -webkit-tap-highlight-color: transparent;
    }
    @media (prefers-color-scheme: dark) {
      .tab { color: #666; }
    }

    .tab.active {
      color: #1a1a1a;
      font-weight: 700;
    }
    @media (prefers-color-scheme: dark) {
      .tab.active { color: #f0f0f2; }
    }

    /* ── chat area ── */
    .chat-area {
      padding: 14px 16px 8px;
      display: flex; flex-direction: column;
    }

    /* messages start from TOP not bottom */
    .msg-wrap {
      display: flex; flex-direction: column;
      gap: 6px;
    }

    .msg { display: flex; flex-direction: column; }
    .msg.user { align-items: flex-end; }
    .msg.bot  { align-items: flex-start; }

    /* user: light grey pill */
    .msg.user .bubble {
      max-width: 78%;
      background: #efefef;
      color: #1a1a1a;
      padding: 9px 14px;
      border-radius: 18px;
      border-bottom-right-radius: 4px;
      font-size: 0.97rem;
      line-height: 1.45;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      .msg.user .bubble { background: #2c2c2e; color: #f0f0f2; }
    }

    /* bot: NO container, mixed serif */
    .msg.bot .bubble {
      max-width: 96%;
      background: none;
      border: none;
      padding: 1px 2px;
      font-family: Georgia, 'Times New Roman', serif;
      font-style: normal;
      font-size: 1.01rem;
      line-height: 1.62;
      color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      .msg.bot .bubble { color: #d0d0d2; }
    }
    .msg.bot .bubble p { margin: 0 0 10px; }
    .msg.bot .bubble p:last-child { margin-bottom: 0; }

    /* typing dots */
    .typing { display: flex; align-items: center; gap: 5px; padding: 6px 4px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: tBounce 1.2s ease-in-out infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tBounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }

    /* ── bot action bar (Claude-style) ── */
    .bot-actions {
      display: flex; align-items: center;
      gap: 2px; padding: 4px 2px 2px;
      opacity: 0; transform: translateY(4px);
      animation: fadeUp 0.22s ease 0.1s forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .bot-actions button {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border: none; background: none; cursor: pointer;
      border-radius: 8px; color: #888;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.13s, color 0.13s; padding: 0;
    }
    .bot-actions button:active { background: rgba(0,0,0,0.07); }
    .bot-actions button svg { width: 18px; height: 18px; stroke-width: 1.9; }
    .bot-actions button.active-like    { color: #2da44e; }
    .bot-actions button.active-dislike { color: #F34655; }
    @media (prefers-color-scheme: dark) {
      .bot-actions button { color: #666; }
      .bot-actions button:active { background: rgba(255,255,255,0.08); }
      .bot-actions button.active-like    { color: #3fb950; }
      .bot-actions button.active-dislike { color: #F34655; }
    }

    /* ── chatbar ── */
    .chatbar-wrap {
      flex-shrink: 0;
      padding: 10px 16px calc(14px + env(safe-area-inset-bottom));
      background: #fff;
      position: relative; z-index: 10;
    }
    @media (prefers-color-scheme: dark) {
      .chatbar-wrap { background: #1c1c1e; }
    }

    .overlay-pill {
      width: 100%; display: flex; align-items: center;
      background: #fff;
      border: 2px solid #F34655; border-radius: 100px;
      padding: 0 18px 0 20px; height: 66px; gap: 12px;
      flex-shrink: 0;
      transition: border-color 0.18s;
    }
    .overlay-pill:focus-within { border-color: #e02235; }
    @media (prefers-color-scheme: dark) {
      .overlay-pill { background: #2c2c2e; border-color: #F34655; }
    }

    .ico-plus {
      flex-shrink: 0; color: #F34655;
      display: flex; align-items: center;
      border: none; background: none; cursor: pointer;
      padding: 4px; border-radius: 50%; transition: background 0.12s;
    }
    .ico-plus:active { background: rgba(243,70,85,0.10); }
    .ico-plus svg { width: 24px; height: 24px; }

    .overlay-input-wrap { flex: 1; position: relative; height: 100%; display: flex; align-items: center; }

    .search-input {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; outline: none; background: transparent;
      font-size: 1.08rem; font-weight: 400; font-family: inherit;
      color: #1a1a1a; padding: 0; z-index: 2;
      caret-color: #F34655; letter-spacing: 0.01em;
    }
    .search-input::placeholder { color: transparent; }
    @media (prefers-color-scheme: dark) { .search-input { color: #e5e5e7; } }

    .shimmer-overlay {
      position: absolute; inset: 0; display: flex; align-items: center;
      pointer-events: none; z-index: 1; overflow: hidden;
    }
    .shimmer-overlay span {
      font-size: 1.08rem; white-space: nowrap; letter-spacing: 0.01em;
      background: linear-gradient(90deg,
        #b0bec5 0%, #b0bec5 25%,
        #F34655 48%, #F34655 52%,
        #b0bec5 75%, #b0bec5 100%);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: sweep 3.5s 1s linear infinite;
    }
    @keyframes sweep {
      0%   { background-position: 150% center; }
      100% { background-position: -150% center; }
    }
    .search-input:not(:placeholder-shown) + .shimmer-overlay { display: none; }

    .ico-camera {
      flex-shrink: 0; border: none; background: none; cursor: pointer;
      color: #F34655; display: flex; align-items: center;
      padding: 4px; border-radius: 50%; transition: background 0.12s;
    }
    .ico-camera:active { background: rgba(243,70,85,0.10); }
    .ico-camera svg { width: 24px; height: 24px; }

    .send-btn {
      flex-shrink: 0; display: none;
      align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%;
      border: none; background: #F34655; cursor: pointer;
      transition: transform 0.15s ease;
    }
    .send-btn:active { transform: scale(0.88); }
    .send-btn svg { width: 17px; height: 17px; }
    .overlay-pill.has-text .ico-camera { display: none; }
    .overlay-pill.has-text .send-btn   { display: flex; }
  </style>
</head>
<body>
  <div class="scroll-host" id="scrollHost">
    <div class="logo-header">
      <img src="Logo.png" alt="Atkyn" />
      <button class="hamburger-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="tab-bar" id="tabBar">
      <button class="tab active" data-tab="ai">Answer</button>
      <button class="tab" data-tab="web">Web</button>
      <button class="tab" data-tab="images">Images</button>
      <button class="tab" data-tab="videos">Videos</button>
      <button class="tab" data-tab="news">News</button>
      <button class="tab" data-tab="maps">Maps</button>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="msg-wrap" id="msgWrap"></div>
    </div>
  </div>

  <div class="chatbar-wrap">
    <div class="overlay-pill" id="pill">
      <button class="ico-plus" aria-label="Add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <div class="overlay-input-wrap">
        <input class="search-input" type="text" id="cbInput" placeholder=" "
          autocomplete="off" enterkeyhint="search" />
        <div class="shimmer-overlay"><span>Ask Atkyn</span></div>
      </div>
      <button class="ico-camera" aria-label="Visual search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="20" x2="12" y2="4"/>
          <polyline points="5 11 12 4 19 11"/>
        </svg>
      </button>
    </div>
  </div>

<script>
  const input      = document.getElementById('cbInput');
  const sendBtn    = document.getElementById('sendBtn');
  const pill       = document.getElementById('pill');
  const msgWrap    = document.getElementById('msgWrap');
  const chatArea   = document.getElementById('chatArea');
  const scrollHost = document.getElementById('scrollHost');

  pill.addEventListener('pointerdown', () => {
    scrollHost.scrollTo({ top: scrollHost.scrollHeight, behavior: 'smooth' });
  });

  input.addEventListener('input', () => {
    pill.classList.toggle('has-text', input.value.trim().length > 0);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  async function send() {
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    pill.classList.remove('has-text');
    addMsg('user', q);
    showTyping();

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q }),
      });

      removeTyping();

      if (!resp.ok) {
        addMsg('bot', 'Something went wrong. Please try again.');
        return;
      }

      const botEl = document.createElement('div');
      botEl.className = 'msg bot';
      const bubbleEl = document.createElement('div');
      bubbleEl.className = 'bubble';
      botEl.appendChild(bubbleEl);
      msgWrap.appendChild(botEl);

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content || '';
            if (!delta) continue;
            fullText += delta;
            bubbleEl.innerHTML = renderMarkdown(fullText);
            scrollHost.scrollTop = scrollHost.scrollHeight;
          } catch (e) { /* skip malformed chunk */ }
        }
      }
      appendBotActions(botEl, fullText);
    } catch (err) {
      removeTyping();
      addMsg('bot', 'Network error. Please try again.');
    }
  }

  function renderMarkdown(text) {
    return text
      .split('\n\n')
      .map(p => '<p>' + p.replace(/\n/g, '<br>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>') + '</p>')
      .join('');
  }

  function addMsg(role, text) {
    const d = document.createElement('div');
    d.className = `msg ${role}`;
    const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    const html = role === 'bot'
      ? safe.split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}</p>`).join('')
      : safe;
    d.innerHTML = `<div class="bubble">${html}</div>`;
    msgWrap.appendChild(d);
    if (role === 'bot') appendBotActions(d, text);
    scrollHost.scrollTop = scrollHost.scrollHeight;
  }

  function appendBotActions(msgEl, fullText) {
    const bar = document.createElement('div');
    bar.className = 'bot-actions';
    const actions = [
      { key: 'copy',    label: 'Copy',    svg: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>` },
      { key: 'retry',   label: 'Retry',   svg: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 19 9 24"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>` },
      { key: 'play',    label: 'Read',    svg: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>` },
      { key: 'like',    label: 'Like',    svg: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>` },
      { key: 'dislike', label: 'Dislike', svg: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>` },
      { key: 'refresh', label: 'Refresh', svg: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>` },
    ];
    actions.forEach(({ key, label, svg }) => {
      const btn = document.createElement('button');
      btn.setAttribute('aria-label', label);
      btn.innerHTML = svg;
      btn.addEventListener('click', () => {
        if (key === 'copy') {
          navigator.clipboard.writeText(msgEl.querySelector('.bubble')?.innerText || fullText).catch(() => {});
          btn.style.color = '#2da44e';
          setTimeout(() => btn.style.color = '', 1200);
        } else if (key === 'like') {
          btn.classList.toggle('active-like');
          bar.querySelector('[aria-label="Dislike"]')?.classList.remove('active-dislike');
        } else if (key === 'dislike') {
          btn.classList.toggle('active-dislike');
          bar.querySelector('[aria-label="Like"]')?.classList.remove('active-like');
        } else if (key === 'refresh' || key === 'retry') {
          btn.style.transition = 'transform 0.45s ease';
          btn.style.transform = 'rotate(360deg)';
          setTimeout(() => { btn.style.transform = ''; btn.style.transition = ''; }, 500);
        }
      });
      bar.appendChild(btn);
    });
    msgEl.appendChild(bar);
    scrollHost.scrollTop = scrollHost.scrollHeight;
  }

  let typingEl = null;
  function showTyping() {
    typingEl = document.createElement('div');
    typingEl.className = 'msg bot';
    typingEl.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
    msgWrap.appendChild(typingEl);
    scrollHost.scrollTop = scrollHost.scrollHeight;
  }
  function removeTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

  /* keyboard fix */
  function fixViewport() {
    const vvp = window.visualViewport;
    if (!vvp) return;
    document.body.style.height = vvp.height + 'px';
    document.body.style.top    = vvp.offsetTop + 'px';
    document.body.style.left   = vvp.offsetLeft + 'px';
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fixViewport);
    window.visualViewport.addEventListener('scroll', fixViewport);
    fixViewport();
  } else {
    document.body.style.height = window.innerHeight + 'px';
    window.addEventListener('resize', () => { document.body.style.height = window.innerHeight + 'px'; });
  }

  const q = new URLSearchParams(location.search).get('q');
  if (q) { input.value = q; pill.classList.add('has-text'); send(); }

  /* collapse logo on scroll */
  const logoHeader = document.querySelector('.logo-header');
  const tabBar = document.getElementById('tabBar');
  scrollHost.addEventListener('scroll', () => {
    const sy = scrollHost.scrollTop;
    if (sy > 8) {
      logoHeader.classList.add('collapsed');
      tabBar.classList.add('scrolled');
    } else if (sy <= 2) {
      logoHeader.classList.remove('collapsed');
      tabBar.classList.remove('scrolled');
    }
  }, { passive: true });

  /* tab switching */
  document.getElementById('tabBar').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  }, { passive: true });
</script>
</body>
</html>
