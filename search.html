<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Atkyn</title>
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; overflow: hidden; }

    body {
      position: fixed; inset: 0;
      overscroll-behavior: none;
      background: #fff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      display: flex; flex-direction: column;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; color: #f0f0f2; }
    }

    /* ── logo header ── */
    .logo-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 13px 18px 8px;
    }
    .logo-header img {
      height: 34px; width: auto; object-fit: contain;
    }

    /* ── tab bar ── */
    .tab-bar {
      flex-shrink: 0;
      display: flex; align-items: center;
      overflow-x: auto; overflow-y: hidden;
      padding: 0 14px;
      gap: 0;
      border-bottom: 1px solid rgba(0,0,0,0.09);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    @media (prefers-color-scheme: dark) {
      .tab-bar { border-bottom-color: rgba(255,255,255,0.08); }
    }

    .tab {
      flex-shrink: 0;
      padding: 8px 13px;
      font-size: 0.82rem;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      letter-spacing: 0.01em;
      white-space: nowrap;
      border: none; background: none;
      -webkit-tap-highlight-color: transparent;
    }
    @media (prefers-color-scheme: dark) {
      .tab { color: #666; }
    }

    .tab.active {
      color: #1a1a1a;
      font-weight: 700;
    }
    @media (prefers-color-scheme: dark) {
      .tab.active { color: #f0f0f2; }
    }

    /* ── chat area ── */
    .chat-area {
      flex: 1; min-height: 0;
      overflow-y: scroll;
      overflow-x: hidden;
      padding: 14px 16px 8px;
      display: flex; flex-direction: column;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      scroll-behavior: smooth;
      will-change: scroll-position;
    }
    .chat-area::-webkit-scrollbar { display: none; }

    /* messages start from TOP not bottom */
    .msg-wrap {
      display: flex; flex-direction: column;
      gap: 6px;
    }

    .msg { display: flex; flex-direction: column; }
    .msg.user { align-items: flex-end; }
    .msg.bot  { align-items: flex-start; }

    /* user: light grey pill */
    .msg.user .bubble {
      max-width: 78%;
      background: #efefef;
      color: #1a1a1a;
      padding: 9px 14px;
      border-radius: 18px;
      border-bottom-right-radius: 4px;
      font-size: 0.92rem;
      line-height: 1.45;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      .msg.user .bubble { background: #2c2c2e; color: #f0f0f2; }
    }

    /* bot: NO container, plain text Claude-style */
    .msg.bot .bubble {
      max-width: 96%;
      background: none;
      border: none;
      padding: 1px 2px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-style: normal;
      font-size: 0.92rem;
      line-height: 1.55;
      color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      .msg.bot .bubble { color: #d0d0d2; }
    }

    /* typing dots */
    .typing { display: flex; align-items: center; gap: 5px; padding: 6px 4px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: tBounce 1.2s ease-in-out infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tBounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }

    /* ── chatbar ── */
    .chatbar-wrap {
      flex-shrink: 0;
      padding: 10px 16px calc(14px + env(safe-area-inset-bottom));
      background: #fff;
      position: relative; z-index: 10;
    }
    @media (prefers-color-scheme: dark) {
      .chatbar-wrap { background: #1c1c1e; }
    }

    .overlay-pill {
      width: 100%; display: flex; align-items: center;
      background: #fff;
      border: 2px solid #F34655; border-radius: 100px;
      padding: 0 18px 0 20px; height: 66px; gap: 12px;
      flex-shrink: 0;
      transition: border-color 0.18s;
    }
    .overlay-pill:focus-within { border-color: #e02235; }
    @media (prefers-color-scheme: dark) {
      .overlay-pill { background: #2c2c2e; border-color: #F34655; }
    }

    .ico-plus {
      flex-shrink: 0; color: #F34655;
      display: flex; align-items: center;
      border: none; background: none; cursor: pointer;
      padding: 4px; border-radius: 50%; transition: background 0.12s;
    }
    .ico-plus:active { background: rgba(243,70,85,0.10); }
    .ico-plus svg { width: 24px; height: 24px; }

    .overlay-input-wrap { flex: 1; position: relative; height: 100%; display: flex; align-items: center; }

    .search-input {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; outline: none; background: transparent;
      font-size: 1.08rem; font-weight: 400; font-family: inherit;
      color: #1a1a1a; padding: 0; z-index: 2;
      caret-color: #F34655; letter-spacing: 0.01em;
    }
    .search-input::placeholder { color: transparent; }
    @media (prefers-color-scheme: dark) { .search-input { color: #e5e5e7; } }

    .shimmer-overlay {
      position: absolute; inset: 0; display: flex; align-items: center;
      pointer-events: none; z-index: 1; overflow: hidden;
    }
    .shimmer-overlay span {
      font-size: 1.08rem; white-space: nowrap; letter-spacing: 0.01em;
      background: linear-gradient(90deg,
        #b0bec5 0%, #b0bec5 25%,
        #F34655 48%, #F34655 52%,
        #b0bec5 75%, #b0bec5 100%);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: sweep 3.5s 1s linear infinite;
    }
    @keyframes sweep {
      0%   { background-position: 150% center; }
      100% { background-position: -150% center; }
    }
    .search-input:not(:placeholder-shown) + .shimmer-overlay { display: none; }

    .ico-camera {
      flex-shrink: 0; border: none; background: none; cursor: pointer;
      color: #F34655; display: flex; align-items: center;
      padding: 4px; border-radius: 50%; transition: background 0.12s;
    }
    .ico-camera:active { background: rgba(243,70,85,0.10); }
    .ico-camera svg { width: 24px; height: 24px; }

    .send-btn {
      flex-shrink: 0; display: none;
      align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%;
      border: none; background: #F34655; cursor: pointer;
      transition: transform 0.15s ease;
    }
    .send-btn:active { transform: scale(0.88); }
    .send-btn svg { width: 17px; height: 17px; }
    .overlay-pill.has-text .ico-camera { display: none; }
    .overlay-pill.has-text .send-btn   { display: flex; }
  </style>
</head>
<body>
  <div class="logo-header">
    <img src="logo.png" alt="Atkyn" />
  </div>
  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="ai">Answer</button>
    <button class="tab" data-tab="web">Web</button>
    <button class="tab" data-tab="images">Images</button>
    <button class="tab" data-tab="videos">Videos</button>
    <button class="tab" data-tab="news">News</button>
    <button class="tab" data-tab="maps">Maps</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="msg-wrap" id="msgWrap"></div>
  </div>

  <div class="chatbar-wrap">
    <div class="overlay-pill" id="pill">
      <button class="ico-plus" aria-label="Add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <div class="overlay-input-wrap">
        <input class="search-input" type="text" id="cbInput" placeholder=" "
          autocomplete="off" enterkeyhint="search" />
        <div class="shimmer-overlay"><span>Ask Atkyn</span></div>
      </div>
      <button class="ico-camera" aria-label="Visual search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="20" x2="12" y2="4"/>
          <polyline points="5 11 12 4 19 11"/>
        </svg>
      </button>
    </div>
  </div>

<script>
  const input   = document.getElementById('cbInput');
  const sendBtn = document.getElementById('sendBtn');
  const pill    = document.getElementById('pill');
  const msgWrap = document.getElementById('msgWrap');
  const chatArea= document.getElementById('chatArea');

  pill.addEventListener('pointerdown', () => {
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
  });

  input.addEventListener('input', () => {
    pill.classList.toggle('has-text', input.value.trim().length > 0);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  function send() {
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    pill.classList.remove('has-text');
    addMsg('user', q);
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMsg('bot', `Searching for: "${q}"…`);
    }, 1200);
  }

  function addMsg(role, text) {
    const d = document.createElement('div');
    d.className = `msg ${role}`;
    d.innerHTML = `<div class="bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`;
    msgWrap.appendChild(d);
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
  }

  let typingEl = null;
  function showTyping() {
    typingEl = document.createElement('div');
    typingEl.className = 'msg bot';
    typingEl.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
    msgWrap.appendChild(typingEl);
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
  }
  function removeTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

  /* pre-fill example conversation */
  const examples = [
    { role: 'user', text: 'Who founded Apple?' },
    { role: 'bot',  text: 'Apple was co-founded in 1976 by Steve Jobs, Steve Wozniak, and Ronald Wayne in a garage in Los Altos, California.' },
    { role: 'user', text: 'What is the speed of light?' },
    { role: 'bot',  text: 'The speed of light in a vacuum is approximately 299,792,458 metres per second — often rounded to 3 × 10⁸ m/s.' },
    { role: 'user', text: 'Best programming language to learn in 2025?' },
    { role: 'bot',  text: 'Python remains the most versatile choice — dominant in AI, data science, and scripting. JavaScript is essential for web. Rust is rising fast for systems work.' },
    { role: 'user', text: 'Distance from Earth to Moon?' },
    { role: 'bot',  text: 'The average distance from Earth to the Moon is about 384,400 km. It varies between 356,500 km at perigee and 406,700 km at apogee.' },
  ];

  examples.forEach(({ role, text }) => addMsg(role, text));

  /* keyboard fix */
  function fixViewport() {
    const vvp = window.visualViewport;
    if (!vvp) return;
    document.body.style.height = vvp.height + 'px';
    document.body.style.top    = vvp.offsetTop + 'px';
    document.body.style.left   = vvp.offsetLeft + 'px';
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fixViewport);
    window.visualViewport.addEventListener('scroll', fixViewport);
    fixViewport();
  } else {
    document.body.style.height = window.innerHeight + 'px';
    window.addEventListener('resize', () => { document.body.style.height = window.innerHeight + 'px'; });
  }

  const q = new URLSearchParams(location.search).get('q');
  if (q) { input.value = q; pill.classList.add('has-text'); send(); }

  /* tab switching */
  document.getElementById('tabBar').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
</script>
</body>
</html>
