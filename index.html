<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atkyn - Search the Web</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .logo {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 30px;
      color: #38bdf8;
    }
    .search-box {
      width: 100%;
      max-width: 600px;
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 15px 20px;
      font-size: 1rem;
      border: 2px solid #334155;
      border-radius: 50px;
      background: #1e293b;
      color: #e2e8f0;
      outline: none;
    }
    input:focus {
      border-color: #38bdf8;
    }
    button {
      padding: 15px 30px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      background: #38bdf8;
      color: #0f172a;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #0ea5e9;
    }
    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="logo">Atkyn</div>
  
  <div class="search-box">
    <input type="text" placeholder="Search the web...">
    <button>Search</button>
  </div>

  <div class="footer">
    Atkyn.com - Fast and Modern Web Search
  </div>
</body>
</html>
