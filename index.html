<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atkyn — fast Internet search</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#3b3b3b" media="(prefers-color-scheme: dark)">

  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; overscroll-behavior: none; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      padding-bottom: 10vh;
    }

    @media (min-width: 900px) { body { padding-bottom: 24vh; } }

    /* ── hamburger ── */
    .hamburger-btn {
      position: fixed; top: 14px; right: 16px;
      border: none; background: none; cursor: pointer;
      display: flex; flex-direction: column; justify-content: center; align-items: flex-end; gap: 5.5px;
      width: 40px; height: 40px; padding: 8px;
      border-radius: 10px; z-index: 50;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, opacity 0.3s;
    }
    .hamburger-btn span { display: block; height: 1.5px; border-radius: 99px; background: #1a1a1a; }
    .hamburger-btn span:nth-child(1) { width: 22px; }
    .hamburger-btn span:nth-child(2) { width: 15px; }
    .hamburger-btn span:nth-child(3) { width: 22px; }
    .hamburger-btn:active { background: rgba(0,0,0,0.06); }
    .overlay-active .hamburger-btn { opacity: 0; pointer-events: none; }

    /* ── logo ── */
    .logo-wrap {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      transition: opacity 0.3s ease, transform 0.35s ease;
      will-change: opacity, transform;
    }
    .logo-img { height: 168px; width: auto; display: block; color: transparent; font-size: 0; transform: scale(1.15); }

    /* ── home search wrap ── */
    .search-wrap {
      width: 100%; max-width: 580px; position: relative;
    }

    .search-pill {
      width: 100%; display: flex; align-items: center;
      border: 2px solid #F34655; border-radius: 100px;
      padding: 0 18px 0 20px; height: 66px;
      background: #fff; gap: 12px;
      cursor: text;
      position: relative; z-index: 10;
    }

    .ico-search { flex-shrink: 0; color: #F34655; display: flex; align-items: center; }
    .ico-search svg { width: 24px; height: 24px; }

    .shimmer-home { flex: 1; overflow: hidden; pointer-events: none; }
    .shimmer-home span {
      font-size: 1.08rem; white-space: nowrap; letter-spacing: 0.01em;
      background: linear-gradient(90deg,
        #b0bec5 0%, #b0bec5 25%,
        #F34655 48%, #F34655 52%,
        #b0bec5 75%, #b0bec5 100%);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: sweep 3.5s 1s linear infinite;
    }
    @keyframes sweep {
      0%   { background-position: 150% center; }
      100% { background-position: -150% center; }
    }

    .ico-camera {
      flex-shrink: 0; border: none; background: none; cursor: pointer;
      color: #F34655; display: flex; align-items: center;
      padding: 4px; border-radius: 50%; transition: background 0.12s;
    }
    .ico-camera:active { background: rgba(243,70,85,0.10); }
    .ico-camera svg { width: 24px; height: 24px; }

    /* ════════════════════════════════
       OVERLAY
       ════════════════════════════════ */
    .search-overlay {
      position: fixed; inset: 0;
      background: #fff;
      z-index: 300;
      display: flex;
      flex-direction: column;
      padding: max(16px, env(safe-area-inset-top)) 22px 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      will-change: opacity;
    }
    .search-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* overlay pill — same 66px, same style */
    .overlay-pill {
      width: 100%; display: flex; align-items: center;
      background: #fff;
      border: 2px solid #F34655; border-radius: 100px;
      padding: 0 18px 0 20px; height: 66px; gap: 12px;
      flex-shrink: 0;
      transition: border-color 0.18s;
    }
    .overlay-pill:focus-within { border-color: #e02235; }

    .overlay-input-wrap { flex: 1; position: relative; height: 100%; display: flex; align-items: center; }

    .search-input {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; outline: none; background: transparent;
      font-size: 1.08rem; font-weight: 400; font-family: inherit;
      color: #1a1a1a; padding: 0; z-index: 2;
      caret-color: #F34655; letter-spacing: 0.01em;
    }
    .search-input::placeholder { color: transparent; }

    .shimmer-overlay {
      position: absolute; inset: 0; display: flex; align-items: center;
      pointer-events: none; z-index: 1; overflow: hidden;
    }
    .shimmer-overlay span {
      font-size: 1.08rem; white-space: nowrap; letter-spacing: 0.01em;
      background: linear-gradient(90deg,
        #b0bec5 0%, #b0bec5 25%,
        #F34655 48%, #F34655 52%,
        #b0bec5 75%, #b0bec5 100%);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: sweep 3.5s 1s linear infinite;
    }
    .search-input:not(:placeholder-shown) + .shimmer-overlay { display: none; }

    /* ── suggestion card ── */
    .suggestions-card {
      margin-top: 14px;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 8px 32px rgba(0,0,0,0.11);
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      will-change: opacity, transform;
    }
    .suggestions-card.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .suggestion-item {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 62px;
      cursor: pointer; transition: background 0.1s;
      border: none; background: none; width: 100%;
      text-align: left; font-family: inherit;
      -webkit-tap-highlight-color: transparent; overflow: hidden;
    }
    .suggestion-item:active,
    .suggestion-item.active { background: #fef5f6; }
    .suggestion-item + .suggestion-item { border-top: 1px solid #f0f2f4; }

    .sug-thumb-wrap { width: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .sug-thumb { max-width: 44px; max-height: 44px; width: auto; height: auto; display: block; border-radius: 6px; }
    .sug-thumb-placeholder { color: #F34655; opacity: 0.4; display: flex; align-items: center; justify-content: center; }
    .sug-thumb-placeholder svg { width: 17px; height: 17px; }

    .sug-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .sug-label { font-size: 0.95rem; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sug-desc  { font-size: 0.73rem; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── DARK MODE ── */
    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; }

      .hamburger-btn span { background: #e5e5e7; }

      .search-pill {
        background: #2c2c2e;
        border-color: #F34655;
      }

      .search-overlay { background: #1c1c1e; }

      .overlay-pill {
        background: #2c2c2e;
        border-color: #F34655;
      }
      .overlay-pill:focus-within { border-color: #e02235; }

      .search-input { color: #e5e5e7; }

      .suggestions-card {
        background: #2c2c2e;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.4);
      }

      .suggestion-item:active,
      .suggestion-item.active { background: #3a2022; }
      .suggestion-item + .suggestion-item { border-top-color: #3a3a3c; }

      .sug-label { color: #e5e5e7; }
      .sug-desc  { color: #8e8e93; }
    }

    /* ════════════════════════════════════
       PREMIUM WEATHER WIDGET
       ════════════════════════════════════ */
    .weather-widget {
      position: fixed;
      top: 18px; left: 14px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(24px) saturate(2);
      -webkit-backdrop-filter: blur(24px) saturate(2);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 22px;
      padding: 12px 16px 10px 12px;
      cursor: default;
      transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      min-width: 148px;
      max-width: 180px;
    }
    .weather-widget:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.11), 0 2px 6px rgba(0,0,0,0.05);
      transform: translateY(-1px);
    }
    .overlay-active .weather-widget { opacity: 0; pointer-events: none; transform: scale(0.94) translateY(4px); }

    /* top row: icon + temp */
    .wx-top { display: flex; align-items: center; gap: 10px; }
    .wx-icon-wrap {
      width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: visible;
    }
    .wx-icon-wrap svg { width: 52px; height: 52px; overflow: visible; }
    .wx-right { display: flex; flex-direction: column; gap: 1px; }
    .wx-temp {
      font-size: 1.55rem; font-weight: 700; color: #1a1a1a;
      letter-spacing: -0.04em; line-height: 1;
    }
    .wx-desc {
      font-size: 0.67rem; color: #555; font-weight: 600;
      letter-spacing: 0.02em; white-space: nowrap;
    }
    .wx-div {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.07), transparent);
      margin: 8px 0 6px;
    }
    .wx-bottom { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .wx-city {
      font-size: 0.62rem; color: #888; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
      display: flex; align-items: center;
    }
    .wx-wind { font-size: 0.6rem; color: #aaa; font-weight: 400; white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; }

    /* skeleton */
    .wx-skel-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e4e4e4 50%, #f0f0f0 75%);
      background-size: 200% auto; animation: wxShimmer 1.4s linear infinite;
    }
    .wx-skel-text {
      height: 22px; width: 80px; border-radius: 6px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e4e4e4 50%, #f0f0f0 75%);
      background-size: 200% auto; animation: wxShimmer 1.4s linear infinite;
    }
    .wx-skel-sub {
      height: 10px; width: 55px; border-radius: 4px; margin-top: 5px;
      background: linear-gradient(90deg, #f4f4f4 25%, #eaeaea 50%, #f4f4f4 75%);
      background-size: 200% auto; animation: wxShimmer 1.6s 0.2s linear infinite;
    }
    @keyframes wxShimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    /* ── DARK MODE weather ── */
    @media (prefers-color-scheme: dark) {
      .weather-widget {
        background: rgba(28,28,32,0.80);
        border-color: rgba(255,255,255,0.06);
        box-shadow: 0 4px 20px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.2);
      }
      .wx-temp { color: #f0f0f2; }
      .wx-desc { color: #aeaeb2; }
      .wx-city { color: #636366; }
      .wx-wind { color: #48484a; }
      .wx-div  { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); }
      .wx-skel-icon,.wx-skel-text,.wx-skel-sub {
        background: linear-gradient(90deg, #2c2c2e 25%, #3a3a3c 50%, #2c2c2e 75%);
        background-size: 200% auto;
      }
    }

    /* ══ CINEMATIC ANIMATIONS ══ */
    .wx-sun-core { animation: wxSunPulse 3s ease-in-out infinite; }
    @keyframes wxSunPulse {
      0%,100%{ filter: drop-shadow(0 0 4px rgba(255,190,0,0.55)); }
      50%    { filter: drop-shadow(0 0 11px rgba(255,210,0,0.92)); }
    }
    .wx-sun-rays { animation: wxSunSpin 14s linear infinite; transform-origin: 26px 26px; }
    @keyframes wxSunSpin { to { transform: rotate(360deg); } }

    .wx-moon { animation: wxMoonGlow 4s ease-in-out infinite; }
    @keyframes wxMoonGlow {
      0%,100%{ filter: drop-shadow(0 0 3px rgba(160,200,255,0.4)); }
      50%    { filter: drop-shadow(0 0 9px rgba(160,200,255,0.82)); }
    }
    .wx-star { animation: wxStarTwinkle 2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .wx-star:nth-child(2){animation-delay:0.7s;} .wx-star:nth-child(3){animation-delay:1.4s;}
    @keyframes wxStarTwinkle {
      0%,100%{opacity:0.3;transform:scale(0.7);} 50%{opacity:1;transform:scale(1.3);}
    }

    .wx-pc-sun  { animation: wxSunSpin 14s linear infinite; transform-origin: 18px 18px; }
    .wx-pc-cloud,.wx-cloud-f { animation: wxCloudBob 4s ease-in-out infinite; }
    .wx-cloud-b { animation: wxCloudBob 6s ease-in-out infinite reverse; opacity:0.4; }
    @keyframes wxCloudBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-2px);} }

    .wx-rain-cloud,.wx-snow-cloud,.wx-wind-cloud { animation: wxCloudDrift 5s ease-in-out infinite; }
    @keyframes wxCloudDrift { 0%,100%{transform:translateX(0);} 50%{transform:translateX(3px);} }

    .wx-rd { animation: wxRainDrop 1.1s ease-in infinite; }
    .wx-rd:nth-child(2){animation-delay:0.22s;} .wx-rd:nth-child(3){animation-delay:0.44s;}
    .wx-rd:nth-child(4){animation-delay:0.66s;} .wx-rd:nth-child(5){animation-delay:0.88s;}
    @keyframes wxRainDrop {
      0%{opacity:0;transform:translateY(-5px) scaleY(0.7);}
      20%{opacity:1;} 80%{opacity:1;}
      100%{opacity:0;transform:translateY(14px);}
    }

    .wx-sf { animation: wxSnowDrop 2.2s ease-in-out infinite, wxSnowFade 2.2s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
    .wx-sf:nth-child(2){animation-delay:0.55s;} .wx-sf:nth-child(3){animation-delay:1.1s;}
    .wx-sf:nth-child(4){animation-delay:0.3s;}  .wx-sf:nth-child(5){animation-delay:0.85s;}
    @keyframes wxSnowDrop { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(8px) rotate(45deg);} }
    @keyframes wxSnowFade { 0%,100%{opacity:0.2;} 50%{opacity:1;} }

    .wx-bolt { animation: wxBolt 2.8s ease-in-out infinite; }
    .wx-bolt-glow { animation: wxBoltGlow 2.8s ease-in-out infinite; }
    @keyframes wxBolt      { 0%,74%,76%,80%,100%{opacity:0;} 75%,79%{opacity:1;} }
    @keyframes wxBoltGlow  { 0%,74%,82%,100%{opacity:0;} 75%,79%{opacity:0.4;} }
    .wx-t-rain{animation:wxRainDrop 0.9s ease-in infinite;}
    .wx-t-rain:nth-child(2){animation-delay:0.3s;} .wx-t-rain:nth-child(3){animation-delay:0.6s;}

    .wx-wl { stroke-dasharray:36; stroke-dashoffset:36; animation: wxWindLine 1.6s ease-in-out infinite; }
    .wx-wl:nth-child(1){animation-delay:0s;} .wx-wl:nth-child(2){animation-delay:0.28s;}
    .wx-wl:nth-child(3){animation-delay:0.56s;} .wx-wl:nth-child(4){animation-delay:0.84s;}
    @keyframes wxWindLine {
      0%{stroke-dashoffset:36;opacity:0;} 15%{opacity:1;} 70%{opacity:1;} 100%{stroke-dashoffset:-36;opacity:0;}
    }

    .wx-fl { stroke-dasharray:60; stroke-dashoffset:0; }
    .wx-fl:nth-child(1){animation:wxFogSlide 3s 0.0s ease-in-out infinite;}
    .wx-fl:nth-child(2){animation:wxFogSlide 3s 0.7s ease-in-out infinite;}
    .wx-fl:nth-child(3){animation:wxFogSlide 3s 1.4s ease-in-out infinite;}
    .wx-fl:nth-child(4){animation:wxFogSlide 3s 2.1s ease-in-out infinite;}
    @keyframes wxFogSlide { 0%,100%{stroke-dashoffset:0;opacity:0.25;} 50%{stroke-dashoffset:10;opacity:0.8;} }
  </style>
</head>
<body>

  <button class="hamburger-btn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <!-- WEATHER WIDGET -->
  <div class="weather-widget" id="weatherWidget" aria-label="Weather">
    <div class="wx-top">
      <div class="wx-icon-wrap" id="wxIcon"><div class="wx-skel-icon"></div></div>
      <div class="wx-right" id="wxRight">
        <div class="wx-skel-text"></div>
        <div class="wx-skel-sub"></div>
      </div>
    </div>
    <div class="wx-div" id="wxDiv" style="display:none"></div>
    <div class="wx-bottom" id="wxBottom" style="display:none">
      <span class="wx-city" id="wxCity"></span>
      <span class="wx-wind" id="wxWind"></span>
    </div>
  </div>

  <!-- HOME -->
  <div class="logo-wrap" id="logoWrap">
    <img class="logo-img" src="Atkyn.png" alt="Atkyn">
  </div>

  <div class="search-wrap" id="homePill">
    <div class="search-pill">
      <span class="ico-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7.5"/><line x1="21" y1="21" x2="16.8" y2="16.8"/>
        </svg>
      </span>
      <div class="shimmer-home"><span>Ask Atkyn anything</span></div>
      <button class="ico-camera" aria-label="Visual search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- OVERLAY -->
  <div class="search-overlay" id="searchOverlay">

    <div class="overlay-pill">
      <span class="ico-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7.5"/><line x1="21" y1="21" x2="16.8" y2="16.8"/>
        </svg>
      </span>
      <div class="overlay-input-wrap">
        <input class="search-input" type="text" id="q" placeholder=" " autocomplete="off" enterkeyhint="search" />
        <div class="shimmer-overlay"><span>Ask Atkyn anything</span></div>
      </div>
      <button class="ico-camera" aria-label="Visual search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
    </div>

    <div class="suggestions-card" id="suggestions"></div>

  </div>

  <script>
    const input    = document.getElementById('q');
    const box      = document.getElementById('suggestions');
    const overlay  = document.getElementById('searchOverlay');
    const homePill = document.getElementById('homePill');
    let active = -1, timer;

    function openOverlay() {
      overlay.classList.add('active');
      document.body.classList.add('overlay-active');
      requestAnimationFrame(() => input.focus());
    }

    function closeOverlay() {
      hideSug();
      input.value = '';
      overlay.classList.remove('active');
      document.body.classList.remove('overlay-active');
      input.blur();
    }

    // tap home pill → open
    homePill.addEventListener('click', openOverlay);

    // tap outside pill/card → close
    overlay.addEventListener('click', function (e) {
      const pill = overlay.querySelector('.overlay-pill');
      const card = document.getElementById('suggestions');
      if (!pill.contains(e.target) && !card.contains(e.target)) {
        closeOverlay();
      }
    });

    function showSug() { box.classList.add('show'); }
    function hideSug() { box.classList.remove('show'); active = -1; }

    function fetchSuggestions(q) {
      return new Promise((resolve) => {
        const cb = 'sg_' + Date.now();
        const s  = document.createElement('script');
        s.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}&callback=${cb}`;
        window[cb] = (data) => { resolve(data[1] || []); delete window[cb]; s.remove(); };
        s.onerror = () => { resolve([]); s.remove(); };
        document.head.appendChild(s);
      });
    }

    const wikiCache = {};
    async function fetchWikiData(query) {
      if (wikiCache[query] !== undefined) return wikiCache[query];
      try {
        const res  = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
        if (!res.ok) { wikiCache[query] = null; return null; }
        const data = await res.json();
        const result = { img: data.thumbnail?.source || null, desc: data.description || null };
        wikiCache[query] = result;
        return result;
      } catch { wikiCache[query] = null; return null; }
    }

    const lensIcon = `<div class="sug-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>`;

    async function render(items) {
      if (!items.length) { hideSug(); return; }
      const top = items.slice(0, 6);
      box.innerHTML = top.map((s, i) => `
        <button class="suggestion-item" data-val="${s.replace(/"/g,'&quot;')}" data-idx="${i}" onmousedown="pick(this)">
          <div class="sug-thumb-wrap" id="thumb-${i}">${lensIcon}</div>
          <span class="sug-text">
            <span class="sug-label">${s}</span>
            <span class="sug-desc" id="desc-${i}"></span>
          </span>
        </button>`).join('');
      showSug();
      active = -1;

      top.forEach(async (s, i) => {
        const data    = await fetchWikiData(s);
        const thumbEl = document.getElementById(`thumb-${i}`);
        const descEl  = document.getElementById(`desc-${i}`);
        if (!thumbEl) return;
        if (data?.img) {
          const img = new Image();
          img.className = 'sug-thumb'; img.alt = '';
          img.onload  = () => { thumbEl.innerHTML = ''; thumbEl.appendChild(img); };
          img.onerror = () => {};
          img.src = data.img;
        }
        if (data?.desc && descEl) descEl.textContent = data.desc;
      });
    }

    function pick(el) {
      input.value = el.dataset.val;
      hideSug();
      doSearch();
    }

    input.addEventListener('input', function () {
      const q = this.value.trim();
      clearTimeout(timer);
      if (!q) { hideSug(); return; }
      timer = setTimeout(async () => {
        const items = await fetchSuggestions(q);
        render(items);
      }, 200);
    });

    input.addEventListener('keydown', function (e) {
      const items = box.querySelectorAll('.suggestion-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        active = Math.min(active + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === active));
        if (items[active]) input.value = items[active].dataset.val;
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        active = Math.max(active - 1, -1);
        items.forEach((el, i) => el.classList.toggle('active', i === active));
        if (active >= 0 && items[active]) input.value = items[active].dataset.val;
      } else if (e.key === 'Enter') {
        hideSug(); doSearch();
      } else if (e.key === 'Escape') {
        closeOverlay();
      }
    });

    function doSearch() {
      const q = input.value.trim();
      if (q) window.location.href = 'search.html?q=' + encodeURIComponent(q);
    }

    /* ══════════════════════════════════════════════
       WEATHER ENGINE v3
       Open-Meteo + Meteocons CDN icons (official, free)
       GPS primary → IP fallback location
       ══════════════════════════════════════════════ */

    // jsDelivr CDN — reliable globally including India, animated SVG
    const MC = 'https://cdn.jsdelivr.net/npm/@meteocons/svg@latest/fill';

    // WMO weather code → { label, day-icon-name, night-icon-name }
    const WX_CODES = {
      0:  { label:'Clear Sky',         d:'clear-day',                      n:'clear-night' },
      1:  { label:'Mostly Clear',      d:'clear-day',                      n:'clear-night' },
      2:  { label:'Partly Cloudy',     d:'partly-cloudy-day',              n:'partly-cloudy-night' },
      3:  { label:'Overcast',          d:'overcast-day',                   n:'overcast-night' },
      45: { label:'Foggy',             d:'fog-day',                        n:'fog-night' },
      48: { label:'Icy Fog',           d:'fog-day',                        n:'fog-night' },
      51: { label:'Light Drizzle',     d:'drizzle',                        n:'drizzle' },
      53: { label:'Drizzle',           d:'drizzle',                        n:'drizzle' },
      55: { label:'Heavy Drizzle',     d:'extreme-drizzle',                n:'extreme-drizzle' },
      61: { label:'Light Rain',        d:'partly-cloudy-day-rain',         n:'partly-cloudy-night-rain' },
      63: { label:'Rain',              d:'rain',                           n:'rain' },
      65: { label:'Heavy Rain',        d:'extreme-rain',                   n:'extreme-rain' },
      71: { label:'Light Snow',        d:'partly-cloudy-day-snow',         n:'partly-cloudy-night-snow' },
      73: { label:'Snow',              d:'snow',                           n:'snow' },
      75: { label:'Heavy Snow',        d:'extreme-snow',                   n:'extreme-snow' },
      77: { label:'Snow Grains',       d:'snow',                           n:'snow' },
      80: { label:'Rain Showers',      d:'partly-cloudy-day-rain',         n:'partly-cloudy-night-rain' },
      81: { label:'Rain Showers',      d:'rain',                           n:'rain' },
      82: { label:'Violent Showers',   d:'extreme-rain',                   n:'extreme-rain' },
      85: { label:'Snow Showers',      d:'partly-cloudy-day-snow',         n:'partly-cloudy-night-snow' },
      86: { label:'Heavy Snow',        d:'extreme-snow',                   n:'extreme-snow' },
      95: { label:'Thunderstorm',      d:'thunderstorms-day-rain',         n:'thunderstorms-night-rain' },
      96: { label:'Thunderstorm',      d:'thunderstorms-day-rain',         n:'thunderstorms-night-rain' },
      99: { label:'Severe Storm',      d:'thunderstorms-day-extreme-rain', n:'thunderstorms-night-extreme-rain' },
    };

    function wxImgTag(code, isDay) {
      const info = WX_CODES[code] || { label:'Unknown', d:'cloudy', n:'cloudy' };
      const name = isDay ? info.d : info.n;
      return {
        html: `<img src="${MC}/${name}.svg" width="52" height="52" alt="${info.label}" style="display:block">`,
        label: info.label,
        name: name
      };
    }

    // After setting img, also try to inline the SVG for full SMIL animation support
    async function inlineWeatherSvg(containerEl, name) {
      try {
        const res = await fetch(`${MC}/${name}.svg`);
        if (!res.ok) return;
        const svgText = await res.text();
        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'width:52px;height:52px;display:flex;align-items:center;justify-content:center;';
        wrapper.innerHTML = svgText;
        const svg = wrapper.querySelector('svg');
        if (svg) {
          svg.setAttribute('width', '52');
          svg.setAttribute('height', '52');
          svg.style.overflow = 'visible';
          containerEl.innerHTML = '';
          containerEl.appendChild(wrapper);
        }
      } catch {}
    }

    // IP-based location (no GPS needed) — free, no key
    async function getLocationByIP() {
      try {
        const r = await fetch('https://ipapi.co/json/');
        const d = await r.json();
        if (d.latitude && d.city) {
          return { lat: d.latitude, lon: d.longitude, city: d.city };
        }
      } catch {}
      try {
        const r2 = await fetch('https://ip-api.com/json/?fields=lat,lon,city');
        const d2 = await r2.json();
        if (d2.lat && d2.city) return { lat: d2.lat, lon: d2.lon, city: d2.city };
      } catch {}
      return null;
    }

    async function reverseGeocode(lat, lon) {
      try {
        const r = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`,
          { headers: { 'Accept-Language': 'en' } }
        );
        const d = await r.json();
        const a = d.address || {};
        return a.city || a.town || a.village || a.county || a.state || null;
      } catch { return null; }
    }

    async function fetchWeather(lat, lon) {
      const r = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&current=wind_speed_10m&timezone=auto&forecast_days=1`
      );
      return r.json();
    }

    async function loadWeather() {
      const elIcon   = document.getElementById('wxIcon');
      const elRight  = document.getElementById('wxRight');
      const elDiv    = document.getElementById('wxDiv');
      const elBottom = document.getElementById('wxBottom');
      const elCity   = document.getElementById('wxCity');
      const elWind   = document.getElementById('wxWind');

      function showError(msg) {
        elIcon.innerHTML = `<img src="${MC}/cloudy.svg" width="56" height="56" alt="Weather" style="display:block;opacity:0.5">`;
        elRight.innerHTML = `<span class="wx-temp">--°</span><span class="wx-desc">${msg}</span>`;
      }

      function renderWeather(data, city) {
        const cw    = data.current_weather;
        const temp  = Math.round(cw.temperature);
        const isDay = cw.is_day === 1;
        const wind  = Math.round(cw.windspeed);
        const { html, label, name } = wxImgTag(cw.weathercode, isDay);

        elIcon.innerHTML  = html;
        elRight.innerHTML = `<span class="wx-temp">${temp}°C</span><span class="wx-desc">${label}</span>`;
        inlineWeatherSvg(elIcon, name);
        elCity.innerHTML = `<svg width="9" height="11" viewBox="0 0 9 11" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-right:3px;flex-shrink:0"><path d="M4.5 0C2.57 0 1 1.57 1 3.5c0 2.63 3.5 7 3.5 7s3.5-4.37 3.5-7C8 1.57 6.43 0 4.5 0zm0 4.75a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5z" fill="#F34655"/></svg>${city}`;
        elWind.innerHTML = `<svg width="11" height="9" viewBox="0 0 11 9" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-right:3px;flex-shrink:0"><path d="M1 2.5h6.5a1.5 1.5 0 1 0-1.5-1.5" stroke="#60A5FA" stroke-width="1.3" stroke-linecap="round"/><path d="M1 4.5h8a2 2 0 1 1-2 2" stroke="#60A5FA" stroke-width="1.3" stroke-linecap="round"/><path d="M1 6.5h4" stroke="#60A5FA" stroke-width="1.3" stroke-linecap="round"/></svg>${wind} km/h`;
        elDiv.style.display    = '';
        elBottom.style.display = '';
      }

      // Strategy 1: GPS (most accurate)
      if (navigator.geolocation) {
        const gpsPromise = new Promise((resolve) => {
          navigator.geolocation.getCurrentPosition(
            pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, src: 'gps' }),
            ()  => resolve(null),
            { timeout: 7000, maximumAge: 300000 }
          );
        });

        // Race GPS against a 7s timeout
        const gpsResult = await gpsPromise;

        if (gpsResult) {
          try {
            const [data, city] = await Promise.all([
              fetchWeather(gpsResult.lat, gpsResult.lon),
              reverseGeocode(gpsResult.lat, gpsResult.lon)
            ]);
            renderWeather(data, city || 'Your Location');
            return;
          } catch {}
        }
      }

      // Strategy 2: IP-based fallback
      try {
        const ipLoc = await getLocationByIP();
        if (ipLoc) {
          const data = await fetchWeather(ipLoc.lat, ipLoc.lon);
          renderWeather(data, ipLoc.city);
          return;
        }
      } catch {}

      showError('Unavailable');
    }

    loadWeather();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }
  </script>
