<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atkyn — fast Internet search</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#3b3b3b" media="(prefers-color-scheme: dark)">

  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; overscroll-behavior: none; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      padding-bottom: 10vh;
    }

    @media (min-width: 900px) { body { padding-bottom: 24vh; } }

    /* ── hamburger ── */
    .hamburger-btn {
      position: fixed; top: 14px; right: 16px;
      border: none; background: none; cursor: pointer;
      display: flex; flex-direction: column; justify-content: center; align-items: flex-end; gap: 5.5px;
      width: 40px; height: 40px; padding: 8px;
      border-radius: 10px; z-index: 50;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, opacity 0.3s;
    }
    .hamburger-btn span { display: block; height: 1.5px; border-radius: 99px; background: #1a1a1a; }
    .hamburger-btn span:nth-child(1) { width: 22px; }
    .hamburger-btn span:nth-child(2) { width: 15px; }
    .hamburger-btn span:nth-child(3) { width: 22px; }
    .hamburger-btn:active { background: rgba(0,0,0,0.06); }
    .overlay-active .hamburger-btn { opacity: 0; pointer-events: none; }

    /* ── logo ── */
    .logo-wrap {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      transition: opacity 0.3s ease, transform 0.35s ease;
      will-change: opacity, transform;
    }
    .logo-img { height: 168px; width: auto; display: block; color: transparent; font-size: 0; transform: scale(1.15); }

    /* ── home search wrap ── */
    .search-wrap {
      width: 100%; max-width: 580px; position: relative;
    }

    .search-pill {
      width: 100%; display: flex; align-items: center;
      border: 2px solid #F34655; border-radius: 100px;
      padding: 0 18px 0 20px; height: 66px;
      background: #fff; gap: 12px;
      cursor: text;
      position: relative; z-index: 10;
    }

    .ico-search { flex-shrink: 0; color: #F34655; display: flex; align-items: center; }
    .ico-search svg { width: 24px; height: 24px; }

    .shimmer-home { flex: 1; overflow: hidden; pointer-events: none; }
    .shimmer-home span {
      font-size: 1.08rem; white-space: nowrap; letter-spacing: 0.01em;
      background: linear-gradient(90deg,
        #b0bec5 0%, #b0bec5 25%,
        #F34655 48%, #F34655 52%,
        #b0bec5 75%, #b0bec5 100%);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: sweep 3.5s 1s linear infinite;
    }
    @keyframes sweep {
      0%   { background-position: 150% center; }
      100% { background-position: -150% center; }
    }

    .ico-camera {
      flex-shrink: 0; border: none; background: none; cursor: pointer;
      color: #F34655; display: flex; align-items: center;
      padding: 4px; border-radius: 50%; transition: background 0.12s;
    }
    .ico-camera:active { background: rgba(243,70,85,0.10); }
    .ico-camera svg { width: 24px; height: 24px; }

    /* ════════════════════════════════
       OVERLAY
       ════════════════════════════════ */
    .search-overlay {
      position: fixed; inset: 0;
      background: #fff;
      z-index: 300;
      display: flex;
      flex-direction: column;
      padding: max(16px, env(safe-area-inset-top)) 22px 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      will-change: opacity;
    }
    .search-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* overlay pill — same 66px, same style */
    .overlay-pill {
      width: 100%; display: flex; align-items: center;
      background: #fff;
      border: 2px solid #F34655; border-radius: 100px;
      padding: 0 18px 0 20px; height: 66px; gap: 12px;
      flex-shrink: 0;
      transition: border-color 0.18s;
    }
    .overlay-pill:focus-within { border-color: #e02235; }

    .overlay-input-wrap { flex: 1; position: relative; height: 100%; display: flex; align-items: center; }

    .search-input {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; outline: none; background: transparent;
      font-size: 1.08rem; font-weight: 400; font-family: inherit;
      color: #1a1a1a; padding: 0; z-index: 2;
      caret-color: #F34655; letter-spacing: 0.01em;
    }
    .search-input::placeholder { color: transparent; }

    .shimmer-overlay {
      position: absolute; inset: 0; display: flex; align-items: center;
      pointer-events: none; z-index: 1; overflow: hidden;
    }
    .shimmer-overlay span {
      font-size: 1.08rem; white-space: nowrap; letter-spacing: 0.01em;
      background: linear-gradient(90deg,
        #b0bec5 0%, #b0bec5 25%,
        #F34655 48%, #F34655 52%,
        #b0bec5 75%, #b0bec5 100%);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: sweep 3.5s 1s linear infinite;
    }
    .search-input:not(:placeholder-shown) + .shimmer-overlay { display: none; }

    /* ── suggestion card ── */
    .suggestions-card {
      margin-top: 14px;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 8px 32px rgba(0,0,0,0.11);
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      will-change: opacity, transform;
    }
    .suggestions-card.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .suggestion-item {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 62px;
      cursor: pointer; transition: background 0.1s;
      border: none; background: none; width: 100%;
      text-align: left; font-family: inherit;
      -webkit-tap-highlight-color: transparent; overflow: hidden;
    }
    .suggestion-item:active,
    .suggestion-item.active { background: #fef5f6; }
    .suggestion-item + .suggestion-item { border-top: 1px solid #f0f2f4; }

    .sug-thumb-wrap { width: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .sug-thumb { max-width: 44px; max-height: 44px; width: auto; height: auto; display: block; border-radius: 6px; }
    .sug-thumb-placeholder { color: #F34655; opacity: 0.4; display: flex; align-items: center; justify-content: center; }
    .sug-thumb-placeholder svg { width: 17px; height: 17px; }

    .sug-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .sug-label { font-size: 0.95rem; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sug-desc  { font-size: 0.73rem; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── DARK MODE ── */
    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; }

      .hamburger-btn span { background: #e5e5e7; }

      .search-pill {
        background: #2c2c2e;
        border-color: #F34655;
      }

      .search-overlay { background: #1c1c1e; }

      .overlay-pill {
        background: #2c2c2e;
        border-color: #F34655;
      }
      .overlay-pill:focus-within { border-color: #e02235; }

      .search-input { color: #e5e5e7; }

      .suggestions-card {
        background: #2c2c2e;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.4);
      }

      .suggestion-item:active,
      .suggestion-item.active { background: #3a2022; }
      .suggestion-item + .suggestion-item { border-top-color: #3a3a3c; }

      .sug-label { color: #e5e5e7; }
      .sug-desc  { color: #8e8e93; }
    }

    /* ════════════════════════════════
       WEATHER WIDGET
       ════════════════════════════════ */
    .weather-widget {
      position: fixed;
      top: 14px;
      left: 16px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px) saturate(1.8);
      -webkit-backdrop-filter: blur(16px) saturate(1.8);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 20px;
      padding: 8px 14px 8px 10px;
      cursor: default;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      min-width: 130px;
    }
    .overlay-active .weather-widget { opacity: 0; pointer-events: none; transform: scale(0.96); }

    .wx-icon-wrap {
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .wx-icon-wrap svg { width: 42px; height: 42px; }

    .wx-info { display: flex; flex-direction: column; gap: 1px; }

    .wx-temp {
      font-size: 1.18rem;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .wx-desc {
      font-size: 0.68rem;
      color: #666;
      font-weight: 500;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }
    .wx-city {
      font-size: 0.63rem;
      color: #999;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }

    /* skeleton shimmer */
    .wx-skeleton {
      width: 90px; height: 32px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% auto;
      border-radius: 8px;
      animation: wxShimmer 1.4s linear infinite;
    }
    @keyframes wxShimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    /* ── DARK MODE weather ── */
    @media (prefers-color-scheme: dark) {
      .weather-widget {
        background: rgba(44,44,46,0.85);
        border-color: rgba(255,255,255,0.08);
        box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      }
      .wx-temp  { color: #e5e5e7; }
      .wx-desc  { color: #aeaeb2; }
      .wx-city  { color: #636366; }
      .wx-skeleton { background: linear-gradient(90deg, #3a3a3c 25%, #48484a 50%, #3a3a3c 75%); background-size: 200% auto; }
    }

    /* animated weather SVG icons */
    .wx-sun-ray  { transform-origin: 21px 21px; animation: wxSpin 8s linear infinite; }
    .wx-cloud-drift { animation: wxDrift 3.5s ease-in-out infinite; }

    /* rain: 3 <line> elements, use nth-of-type to skip the <path> cloud */
    .wx-rain-drop                    { animation: wxFall 1.1s ease-in infinite; }
    .wx-rain-drop:nth-of-type(2)    { animation-delay: 0.32s; }
    .wx-rain-drop:nth-of-type(3)    { animation-delay: 0.64s; }

    /* snow: 3 <circle> elements */
    .wx-snow-flake                   { animation: wxFloat 2s ease-in-out infinite; }
    .wx-snow-flake:nth-of-type(2)   { animation-delay: 0.5s; }
    .wx-snow-flake:nth-of-type(3)   { animation-delay: 1s; }

    .wx-lightning { animation: wxFlash 1.8s ease-in-out infinite; }

    /* fog lines */
    .wx-fog-line                     { animation: wxFade 2.5s ease-in-out infinite; }
    .wx-fog-line:nth-of-type(2)     { animation-delay: 0.6s; }
    .wx-fog-line:nth-of-type(3)     { animation-delay: 1.2s; }

    @keyframes wxSpin  { to { transform: rotate(360deg); } }
    @keyframes wxDrift { 0%,100% { transform: translateX(0); } 50% { transform: translateX(4px); } }
    @keyframes wxFall  {
      0%   { transform: translateY(-6px) scaleY(0.8); opacity: 0; }
      30%  { opacity: 1; }
      100% { transform: translateY(12px) scaleY(1.1); opacity: 0; }
    }
    @keyframes wxFloat {
      0%,100% { transform: translateY(0);   opacity: 1;   }
      50%      { transform: translateY(4px); opacity: 0.4; }
    }
    @keyframes wxFlash {
      0%,90%,100% { opacity: 1; }
      45%,55%     { opacity: 0.1; }
    }
    @keyframes wxFade  { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }

    /* ════════════════════════════════
       STOCK TICKER WIDGET
       ════════════════════════════════ */
    .stock-widget {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px) saturate(1.8);
      -webkit-backdrop-filter: blur(16px) saturate(1.8);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 20px;
      padding: 9px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
      overflow: hidden;
    }
    .overlay-active .stock-widget { opacity: 0; pointer-events: none; transform: translateX(-50%) scale(0.96); }

    .stock-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      padding: 0 8px;
      border-right: 1px solid rgba(0,0,0,0.07);
      min-width: 62px;
    }
    .stock-item:last-child { border-right: none; }

    .stock-name {
      font-size: 0.6rem;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .stock-price {
      font-size: 0.82rem;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .stock-change {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .stock-change.up   { color: #16a34a; }
    .stock-change.down { color: #dc2626; }

    .stock-skel {
      width: 52px; height: 28px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% auto;
      border-radius: 6px;
      animation: wxShimmer 1.4s linear infinite;
    }

    /* dark mode stocks */
    @media (prefers-color-scheme: dark) {
      .stock-widget {
        background: rgba(44,44,46,0.85);
        border-color: rgba(255,255,255,0.08);
        box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      }
      .stock-item { border-right-color: rgba(255,255,255,0.08); }
      .stock-name  { color: #636366; }
      .stock-price { color: #e5e5e7; }
      .stock-change.up   { color: #4ade80; }
      .stock-change.down { color: #f87171; }
      .stock-skel { background: linear-gradient(90deg, #3a3a3c 25%, #48484a 50%, #3a3a3c 75%); background-size: 200% auto; }
    }
  </style>
</head>
<body>

  <button class="hamburger-btn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <!-- WEATHER WIDGET -->
  <div class="weather-widget" id="weatherWidget" aria-label="Weather">
    <div class="wx-icon-wrap" id="wxIcon">
      <div class="wx-skeleton"></div>
    </div>
    <div class="wx-info" id="wxInfo">
      <div class="wx-skeleton"></div>
    </div>
  </div>

  <!-- STOCK TICKER WIDGET -->
  <div class="stock-widget" id="stockWidget" aria-label="Markets">
    <div class="stock-skel"></div>
  </div>

  <!-- HOME -->
  <div class="logo-wrap" id="logoWrap">
    <img class="logo-img" src="Atkyn.png" alt="Atkyn">
  </div>

  <div class="search-wrap" id="homePill">
    <div class="search-pill">
      <span class="ico-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7.5"/><line x1="21" y1="21" x2="16.8" y2="16.8"/>
        </svg>
      </span>
      <div class="shimmer-home"><span>Ask Atkyn anything</span></div>
      <button class="ico-camera" aria-label="Visual search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- OVERLAY -->
  <div class="search-overlay" id="searchOverlay">

    <div class="overlay-pill">
      <span class="ico-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7.5"/><line x1="21" y1="21" x2="16.8" y2="16.8"/>
        </svg>
      </span>
      <div class="overlay-input-wrap">
        <input class="search-input" type="text" id="q" placeholder=" " autocomplete="off" enterkeyhint="search" />
        <div class="shimmer-overlay"><span>Ask Atkyn anything</span></div>
      </div>
      <button class="ico-camera" aria-label="Visual search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
    </div>

    <div class="suggestions-card" id="suggestions"></div>

  </div>

  <script>
    const input    = document.getElementById('q');
    const box      = document.getElementById('suggestions');
    const overlay  = document.getElementById('searchOverlay');
    const homePill = document.getElementById('homePill');
    let active = -1, timer;

    function openOverlay() {
      overlay.classList.add('active');
      document.body.classList.add('overlay-active');
      requestAnimationFrame(() => input.focus());
    }

    function closeOverlay() {
      hideSug();
      input.value = '';
      overlay.classList.remove('active');
      document.body.classList.remove('overlay-active');
      input.blur();
    }

    // tap home pill → open
    homePill.addEventListener('click', openOverlay);

    // tap outside pill/card → close
    overlay.addEventListener('click', function (e) {
      const pill = overlay.querySelector('.overlay-pill');
      const card = document.getElementById('suggestions');
      if (!pill.contains(e.target) && !card.contains(e.target)) {
        closeOverlay();
      }
    });

    function showSug() { box.classList.add('show'); }
    function hideSug() { box.classList.remove('show'); active = -1; }

    function fetchSuggestions(q) {
      return new Promise((resolve) => {
        const cb = 'sg_' + Date.now();
        const s  = document.createElement('script');
        s.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}&callback=${cb}`;
        window[cb] = (data) => { resolve(data[1] || []); delete window[cb]; s.remove(); };
        s.onerror = () => { resolve([]); s.remove(); };
        document.head.appendChild(s);
      });
    }

    const wikiCache = {};
    async function fetchWikiData(query) {
      if (wikiCache[query] !== undefined) return wikiCache[query];
      try {
        const res  = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
        if (!res.ok) { wikiCache[query] = null; return null; }
        const data = await res.json();
        const result = { img: data.thumbnail?.source || null, desc: data.description || null };
        wikiCache[query] = result;
        return result;
      } catch { wikiCache[query] = null; return null; }
    }

    const lensIcon = `<div class="sug-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>`;

    async function render(items) {
      if (!items.length) { hideSug(); return; }
      const top = items.slice(0, 6);
      box.innerHTML = top.map((s, i) => `
        <button class="suggestion-item" data-val="${s.replace(/"/g,'&quot;')}" data-idx="${i}" onmousedown="pick(this)">
          <div class="sug-thumb-wrap" id="thumb-${i}">${lensIcon}</div>
          <span class="sug-text">
            <span class="sug-label">${s}</span>
            <span class="sug-desc" id="desc-${i}"></span>
          </span>
        </button>`).join('');
      showSug();
      active = -1;

      top.forEach(async (s, i) => {
        const data    = await fetchWikiData(s);
        const thumbEl = document.getElementById(`thumb-${i}`);
        const descEl  = document.getElementById(`desc-${i}`);
        if (!thumbEl) return;
        if (data?.img) {
          const img = new Image();
          img.className = 'sug-thumb'; img.alt = '';
          img.onload  = () => { thumbEl.innerHTML = ''; thumbEl.appendChild(img); };
          img.onerror = () => {};
          img.src = data.img;
        }
        if (data?.desc && descEl) descEl.textContent = data.desc;
      });
    }

    function pick(el) {
      input.value = el.dataset.val;
      hideSug();
      doSearch();
    }

    input.addEventListener('input', function () {
      const q = this.value.trim();
      clearTimeout(timer);
      if (!q) { hideSug(); return; }
      timer = setTimeout(async () => {
        const items = await fetchSuggestions(q);
        render(items);
      }, 200);
    });

    input.addEventListener('keydown', function (e) {
      const items = box.querySelectorAll('.suggestion-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        active = Math.min(active + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === active));
        if (items[active]) input.value = items[active].dataset.val;
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        active = Math.max(active - 1, -1);
        items.forEach((el, i) => el.classList.toggle('active', i === active));
        if (active >= 0 && items[active]) input.value = items[active].dataset.val;
      } else if (e.key === 'Enter') {
        hideSug(); doSearch();
      } else if (e.key === 'Escape') {
        closeOverlay();
      }
    });

    function doSearch() {
      const q = input.value.trim();
      if (q) window.location.href = 'search.html?q=' + encodeURIComponent(q);
    }

    /* ══════════════════════════════════════════
       WEATHER ENGINE — Open-Meteo (free, no key)
       + Open-Meteo Geocoding (reverse) for city
       ══════════════════════════════════════════ */

    const WX_CODES = {
      0:  { label: 'Clear Sky',        icon: 'sunny' },
      1:  { label: 'Mostly Clear',     icon: 'sunny' },
      2:  { label: 'Partly Cloudy',    icon: 'partly' },
      3:  { label: 'Overcast',         icon: 'cloudy' },
      45: { label: 'Foggy',            icon: 'fog' },
      48: { label: 'Icy Fog',          icon: 'fog' },
      51: { label: 'Light Drizzle',    icon: 'rain' },
      53: { label: 'Drizzle',          icon: 'rain' },
      55: { label: 'Heavy Drizzle',    icon: 'rain' },
      61: { label: 'Light Rain',       icon: 'rain' },
      63: { label: 'Rain',             icon: 'rain' },
      65: { label: 'Heavy Rain',       icon: 'rain' },
      71: { label: 'Light Snow',       icon: 'snow' },
      73: { label: 'Snow',             icon: 'snow' },
      75: { label: 'Heavy Snow',       icon: 'snow' },
      77: { label: 'Snow Grains',      icon: 'snow' },
      80: { label: 'Rain Showers',     icon: 'rain' },
      81: { label: 'Rain Showers',     icon: 'rain' },
      82: { label: 'Violent Showers',  icon: 'rain' },
      85: { label: 'Snow Showers',     icon: 'snow' },
      86: { label: 'Heavy Snow Showers', icon: 'snow' },
      95: { label: 'Thunderstorm',     icon: 'thunder' },
      96: { label: 'Thunderstorm+Hail',icon: 'thunder' },
      99: { label: 'Severe Thunderstorm', icon: 'thunder' },
    };

    function wxIcon(type, isDay) {
      if (type === 'sunny' && isDay) return `
        <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g class="wx-sun-ray">
            <line x1="21" y1="2" x2="21" y2="7" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="21" y1="35" x2="21" y2="40" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="2" y1="21" x2="7" y2="21" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="35" y1="21" x2="40" y2="21" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="6.5" y1="6.5" x2="10" y2="10" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="32" y1="32" x2="35.5" y2="35.5" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="35.5" y1="6.5" x2="32" y2="10" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="10" y1="32" x2="6.5" y2="35.5" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/>
          </g>
          <circle cx="21" cy="21" r="9" fill="#FFD000" stroke="#F5A800" stroke-width="1.5"/>
        </svg>`;
      if (type === 'sunny' && !isDay) return `
        <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M29 13a10 10 0 1 1-14 14A10 10 0 0 1 29 13z" fill="#90CAF9" stroke="#64B5F6" stroke-width="1.4"/>
          <circle cx="32" cy="10" r="2.2" fill="#BBDEFB"/>
          <circle cx="36" cy="16" r="1.5" fill="#BBDEFB"/>
        </svg>`;
      if (type === 'partly') return isDay ? `
        <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g class="wx-sun-ray">
            <line x1="11" y1="2" x2="11" y2="6" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
            <line x1="3" y1="10" x2="6.5" y2="12" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
            <line x1="2" y1="19" x2="6" y2="19" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
          </g>
          <circle cx="15" cy="16" r="8" fill="#FFD000" stroke="#F5A800" stroke-width="1.3"/>
          <g class="wx-cloud-drift">
            <path d="M9 26a8 8 0 0 1 16 0h4a5 5 0 0 1 0 10H9a8 8 0 0 1 0-10z" fill="#64B5F6" stroke="#42A5F5" stroke-width="1.2"/>
            <path d="M9 26a8 8 0 0 1 16 0" fill="#90CAF9" stroke="none"/>
          </g>
        </svg>` : `
        <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M27 12a9 9 0 1 1-12 12" fill="none" stroke="#90CAF9" stroke-width="2" stroke-linecap="round"/>
          <g class="wx-cloud-drift">
            <path d="M9 26a8 8 0 0 1 16 0h4a5 5 0 0 1 0 10H9a8 8 0 0 1 0-10z" fill="#64B5F6" stroke="#42A5F5" stroke-width="1.2"/>
          </g>
        </svg>`;
      if (type === 'cloudy') return `
        <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g class="wx-cloud-drift">
            <path d="M6 22a9 9 0 0 1 18 0h5a6 6 0 0 1 0 12H6a9 9 0 0 1 0-12z" fill="#64B5F6" stroke="#42A5F5" stroke-width="1.3"/>
            <path d="M6 22a9 9 0 0 1 18 0" fill="#90CAF9" stroke="none"/>
          </g>
        </svg>`;
      if (type === 'rain') return `
        <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 18a8 8 0 0 1 16 0h5a5 5 0 0 1 0 10H6a8 8 0 0 1 0-10z" fill="#64B5F6" stroke="#42A5F5" stroke-width="1.2"/>
          <line class="wx-rain-drop" x1="12" y1="32" x2="10" y2="39" stroke="#1E88E5" stroke-width="2.2" stroke-linecap="round"/>
          <line class="wx-rain-drop" x1="20" y1="32" x2="18" y2="39" stroke="#1E88E5" stroke-width="2.2" stroke-linecap="round"/>
          <line class="wx-rain-drop" x1="28" y1="32" x2="26" y2="39" stroke="#1E88E5" stroke-width="2.2" stroke-linecap="round"/>
        </svg>`;
      if (type === 'snow') return `
        <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 18a8 8 0 0 1 16 0h5a5 5 0 0 1 0 10H6a8 8 0 0 1 0-10z" fill="#90CAF9" stroke="#64B5F6" stroke-width="1.2"/>
          <circle class="wx-snow-flake" cx="13" cy="36" r="2.2" fill="#42A5F5"/>
          <circle class="wx-snow-flake" cx="21" cy="36" r="2.2" fill="#42A5F5"/>
          <circle class="wx-snow-flake" cx="29" cy="36" r="2.2" fill="#42A5F5"/>
        </svg>`;
      if (type === 'thunder') return `
        <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 16a9 9 0 0 1 18 0h6a6 6 0 0 1 0 12H5a9 9 0 0 1 0-12z" fill="#78909C" stroke="#546E7A" stroke-width="1.2"/>
          <path class="wx-lightning" d="M21 28L17 35h5L18 42" stroke="#FFD600" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>`;
      if (type === 'fog') return `
        <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line class="wx-fog-line" x1="5" y1="15" x2="37" y2="15" stroke="#90CAF9" stroke-width="3" stroke-linecap="round"/>
          <line class="wx-fog-line" x1="9" y1="23" x2="37" y2="23" stroke="#90CAF9" stroke-width="3" stroke-linecap="round"/>
          <line class="wx-fog-line" x1="5" y1="31" x2="31" y2="31" stroke="#90CAF9" stroke-width="3" stroke-linecap="round"/>
        </svg>`;
      return `<svg viewBox="0 0 42 42"><circle cx="21" cy="21" r="14" fill="#64B5F6"/></svg>`;
    }

    async function reverseGeocode(lat, lon) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`, {
          headers: { 'Accept-Language': 'en' }
        });
        const d = await res.json();
        const a = d.address || {};
        return a.city || a.town || a.village || a.county || a.state || 'Your Location';
      } catch { return 'Your Location'; }
    }

    async function loadWeather() {
      const wxIcon_el  = document.getElementById('wxIcon');
      const wxInfo_el  = document.getElementById('wxInfo');

      if (!navigator.geolocation) {
        wxIcon_el.innerHTML = wxIcon('cloudy', true);
        wxInfo_el.innerHTML = `<span class="wx-temp">--°</span><span class="wx-desc">Location unavailable</span>`;
        return;
      }

      navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude: lat, longitude: lon } = pos.coords;

        try {
          const [weatherRes, city] = await Promise.all([
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,is_day&timezone=auto`),
            reverseGeocode(lat, lon)
          ]);

          const data = await weatherRes.json();
          const cw   = data.current;
          const code = cw.weather_code;
          const temp = Math.round(cw.temperature_2m);
          const isDay = cw.is_day === 1;
          const info = WX_CODES[code] || { label: 'Unknown', icon: 'cloudy' };

          wxIcon_el.innerHTML = wxIcon(info.icon, isDay);
          // Force reflow so CSS animations restart cleanly after innerHTML inject
          void wxIcon_el.offsetWidth;

          wxInfo_el.innerHTML = `
            <span class="wx-temp">${temp}°C</span>
            <span class="wx-desc">${info.label}</span>
            <span class="wx-city">${city}</span>
          `;
        } catch {
          wxIcon_el.innerHTML = wxIcon('cloudy', true);
          void wxIcon_el.offsetWidth;
          wxInfo_el.innerHTML = `<span class="wx-temp">--°</span><span class="wx-desc">Unavailable</span>`;
        }
      }, () => {
        wxIcon_el.innerHTML = wxIcon('cloudy', true);
        void wxIcon_el.offsetWidth;
        wxInfo_el.innerHTML = `<span class="wx-temp">--°</span><span class="wx-desc">Allow location</span>`;
      }, { timeout: 8000, maximumAge: 300000 });
    }

    loadWeather();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }
  </script>
