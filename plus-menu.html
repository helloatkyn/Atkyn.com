<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plus Menu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    /* ── backdrop ── */
    .backdrop {
      position: fixed; inset: 0;
      background: transparent;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── floating card ── */
    .plus-menu {
      position: fixed;
      /* positioned by JS relative to plus button */
      bottom: 90px;
      left: 16px;
      width: 220px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow:
        0 0 0 0.5px rgba(0,0,0,0.08),
        0 8px 32px rgba(0,0,0,0.14),
        0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
      z-index: 101;

      /* slide-up animation */
      transform: translateY(10px) scale(0.96);
      transform-origin: bottom left;
      opacity: 0;
      pointer-events: none;
      transition:
        transform 0.22s cubic-bezier(0.22, 1, 0.36, 1),
        opacity   0.18s ease;
    }
    .plus-menu.open {
      transform: translateY(0) scale(1);
      opacity: 1;
      pointer-events: all;
    }

    @media (prefers-color-scheme: dark) {
      .plus-menu {
        background: #2c2c2e;
        box-shadow:
          0 0 0 0.5px rgba(255,255,255,0.06),
          0 8px 32px rgba(0,0,0,0.5),
          0 2px 8px rgba(0,0,0,0.3);
      }
    }

    /* ── menu items ── */
    .menu-item {
      display: flex; align-items: center;
      gap: 14px;
      padding: 13px 16px;
      cursor: pointer;
      border: none; background: none; width: 100%;
      text-align: left;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: 450;
      letter-spacing: 0.01em;
      transition: background 0.12s;
      position: relative;
    }
    .menu-item:active { background: rgba(0,0,0,0.05); }
    .menu-item + .menu-item::before {
      content: '';
      position: absolute; top: 0; left: 46px; right: 0;
      height: 0.5px;
      background: rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      .menu-item { color: #f0f0f2; }
      .menu-item:active { background: rgba(255,255,255,0.07); }
      .menu-item + .menu-item::before { background: rgba(255,255,255,0.07); }
    }

    /* ── icon wrapper ── */
    .menu-icon {
      flex-shrink: 0;
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .menu-icon svg { width: 17px; height: 17px; }

    /* icon bg colours */
    .icon-photo    { background: #ff9f0a; }
    .icon-camera   { background: #F34655; }
    .icon-file     { background: #0071e3; }
    .icon-location { background: #34c759; }

    .menu-label { flex: 1; }

    /* ── demo scaffold (remove in production) ── */
    body {
      background: rgba(0,0,0,0.3);
      height: 100vh;
      display: flex; align-items: flex-end;
      padding-bottom: 80px;
    }
    .demo-trigger {
      margin: 0 16px;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: #F34655;
      color: #fff;
      font-size: 1.5rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(243,70,85,0.35);
    }
  </style>
</head>
<body>

  <!-- backdrop — closes menu on outside tap -->
  <div class="backdrop" id="backdrop"></div>

  <!-- floating menu card -->
  <div class="plus-menu" id="plusMenu">

    <button class="menu-item" onclick="handleAction('photo')">
      <span class="menu-icon icon-photo">
        <!-- Photo Library -->
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </span>
      <span class="menu-label">Photo Library</span>
    </button>

    <button class="menu-item" onclick="handleAction('camera')">
      <span class="menu-icon icon-camera">
        <!-- Camera -->
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </span>
      <span class="menu-label">Camera</span>
    </button>

    <button class="menu-item" onclick="handleAction('file')">
      <span class="menu-icon icon-file">
        <!-- File -->
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </span>
      <span class="menu-label">Upload File</span>
    </button>

    <button class="menu-item" onclick="handleAction('location')">
      <span class="menu-icon icon-location">
        <!-- Location -->
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </span>
      <span class="menu-label">Location</span>
    </button>

  </div>

  <!-- demo trigger button -->
  <button class="demo-trigger" id="demoTrigger" onclick="toggleMenu()">+</button>

<script>
  const menu     = document.getElementById('plusMenu');
  const backdrop = document.getElementById('backdrop');
  let isOpen = false;

  function openMenu() {
    isOpen = true;
    menu.classList.add('open');
    backdrop.classList.add('open');
  }

  function closeMenu() {
    isOpen = false;
    menu.classList.remove('open');
    backdrop.classList.remove('open');
  }

  function toggleMenu() {
    isOpen ? closeMenu() : openMenu();
  }

  backdrop.addEventListener('click', closeMenu);

  function handleAction(type) {
    closeMenu();
    // wire up your actual actions here
    console.log('Action:', type);
  }

  /* ── Export for parent page integration ──
   * In search-3-4.html, replace the ico-plus click with:
   *   plusMenuOpen ? closePlusMenu() : openPlusMenu()
   * and position the menu relative to the plus button's getBoundingClientRect()
   */
  window.PlusMenu = { open: openMenu, close: closeMenu, toggle: toggleMenu };
</script>
</body>
</html>
